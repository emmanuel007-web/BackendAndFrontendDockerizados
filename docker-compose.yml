services:

  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network

  backend:
    build:
      context: ./back-register-Login-alejo
      dockerfile: Dockerfile
    container_name: spring_backend
    ports:
      - "8080:8080"
    environment:                                                          
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/mydb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres
    networks:
      - front-network
      - db-network

  frontend:
    build:
      context: ./front-register-Login-alejo
      dockerfile: Dockerfile
    container_name: angular_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - front-network

volumes:
  postgres_data:

networks:
  front-network:
  db-network:


